name: mce-field-operations
description: Main Character Energy - Field Operations Dashboard

# Application configuration
config:
  # Environment variables
  env:
    - name: LAKEBASE_OAUTH_TOKEN
      value: "{{secrets/mce-secrets/lakebase-oauth-token}}"

    - name: DATABRICKS_HOST
      value: "https://fe-sandbox-serverless-sandbox-tladem.cloud.databricks.com"

# Resources
resources:
  # Backend API server
  - name: backend
    runtime: python3.11
    source_code_path: ./backend
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - name: LAKEBASE_OAUTH_TOKEN
        value: "{{secrets/mce-secrets/lakebase-oauth-token}}"

  # Frontend static files
  - name: frontend
    runtime: static
    source_code_path: ./frontend/dist

# Permissions
permissions:
  service_principal: true

# Compute
compute:
  size: SMALL
